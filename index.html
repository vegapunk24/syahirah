<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Booklet</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <audio id="bgAudio" loop preload="metadata" playsinline>
      <source src="song.mp3" type="audio/mpeg" />
    </audio>

    <main class="stage">
      <section class="booklet" aria-label="Interactive photo booklet">
        <div class="page1"></div>
        <div class="page2Container">
          <div class="page2">
            <div class="back"></div>
            <div class="front"></div>
          </div>
          <div class="page3">
            <div class="back"></div>
            <div class="front"></div>
          </div>
        </div>
      </section>

      <button type="button" class="openBtn" aria-label="Open or close booklet and play music">
        <img src="hand-icon.png" alt="Open booklet" />
      </button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
